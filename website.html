<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>designing a website</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
       <!-- hambergur -->
        <div class="hambergur">
          <i class="fa-solid fa-bars" data-visible="false"></i>
          <i class="fa-solid fa-close" data-visible="false"></i>
        </div>
       <!-- desktop menu -->
        <nav class="container desktop-menu">
           <!-- left-menu -->
           <ul class="menus-link" id="left-menu">
                <li><a href="">OUR PHILOSOPHY</a></li>
                <li><a href="">HOUSES</a></li>
                <li><a href="">MAP</a></li>
           </ul>
            <!-- logo -->
             <H1>Retreatm5</H1>
             <!-- right-menu -->
              <ul class="menus-link" id="right-menu">
                <li><a href="">LEISURE</a></li>
                <li><a href="">HOW TO GET THERE</a></li>
                <li><a href="">CONTACTS</a></li>
              </ul>
        </nav>

        <!-- mobile menu -->
         <nav class="mobile-menu" data-visible="false">

           <div class="navigation">

            <h1>Retreatm5</h1>
                <ul class="menus-link" >
                   <li><a href="">OUR PHILOSOPHY</a></li>
                   <li><a href="">HOUSES</a></li>
                   <li><a href="">MAP</a></li>
                   <li><a href="">LEISURE</a></li>
                   <li><a href="">HOW TO GET THERE</a></li>
                   <li><a href="">CONTACTS</a></li>

               </ul>
               
               <div class="mobile-menu-action">
                <a href="#" class="btn-primary">Book a room</a>
                <a href="#" class="btn-secondary">Write to us</a>
               </div>



           </div>

         </nav>

    </header>


     <script>
        const hambergur = document.querySelector('.hamburger');
        const mobileMenu = document.querySelector(".mobile-menu");
        const icons = document.querySelectorAll("i");

        hambergur.addEventListener("click", function (event) {
            const isVisible = mobileMenu.getAttribute('data-visible');
            if (isVisible == "true") {
                // qari hiding
                mobileMenu.setAttribute('data-visible', "false");
                icons[0].setAttribute('data-visible', "true");
                icons[1].setAttribute('data-visible', "false");
            } else if (isVisible == "false") {
                // soo bandhig showing
                mobileMenu.setAttribute('data-visible', "true");
                icons[0].setAttribute('data-visible', "false");
                icons[1].setAttribute('data-visible', "true");
            }
        });


    </script>
</body>
</html>
